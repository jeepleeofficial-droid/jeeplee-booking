<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>彩排室預訂 · jeeplee</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif;background:#fff;color:#1a1a1a}
input,textarea,select,button{font-family:inherit}
.page{padding:2.5rem 2.5rem 4rem;max-width:680px;margin:0 auto}
.page-title{font-size:30px;font-weight:600;color:#1a1a1a;margin-bottom:.2rem}
.page-sub{font-size:14px;color:#9b9b9b;margin-bottom:2rem}
.tab-row{display:flex;border-bottom:1px solid #e8e8e8;margin-bottom:1.75rem}
.tab{padding:8px 18px;font-size:14px;cursor:pointer;color:#9b9b9b;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom-color:#1a1a1a}
.tab:hover:not(.active){color:#555}
.prop-row{display:flex;align-items:baseline;min-height:34px;padding:3px 0}
.prop-label{font-size:14px;color:#9b9b9b;width:130px;flex-shrink:0;padding-top:4px}
.prop-value{flex:1}
.n-input{width:100%;background:none;border:none;outline:none;font-size:14px;color:#1a1a1a;padding:3px 6px;border-radius:4px;transition:background .12s}
.n-input:hover,.n-input:focus{background:#f1f1ef}
.n-input::placeholder{color:#ccc}
.n-input.required-empty{background:#fff5f5}
.n-select{width:100%;background:none;border:none;outline:none;font-size:14px;color:#1a1a1a;padding:3px 6px;border-radius:4px;cursor:pointer;appearance:none;transition:background .12s}
.n-select:hover,.n-select:focus{background:#f1f1ef}
.divider{height:1px;background:#f0f0f0;margin:1.25rem 0}

.alert{border-radius:0 7px 7px 0;padding:.55rem .9rem;margin:.6rem 0;font-size:13px;line-height:1.5}
.alert-warn{background:#fffbf0;border-left:3px solid #f0c040;color:#9a7000}
.alert-err{background:#fff2f2;border-left:3px solid #e05c5c;color:#b03030}
.sync-row{display:flex;align-items:center;gap:7px;font-size:13px;color:#9b9b9b;margin:.3rem 0}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#52b76b}
.dot-err{background:#e05c5c}
.dot-spin{background:#ddd;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.btn-dark{padding:8px 18px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-dark:hover{opacity:.8}
.btn-dark:disabled{opacity:.3;cursor:not-allowed}
.btn-outline{padding:8px 16px;background:none;border:1px solid #d8d8d8;border-radius:7px;font-size:13px;color:#555;cursor:pointer;transition:background .12s}
.btn-outline:hover{background:#f7f7f5}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.month-btn{background:none;border:none;cursor:pointer;color:#9b9b9b;font-size:18px;padding:3px 10px;border-radius:5px}
.month-btn:hover{background:#f1f1ef}
.month-label{font-size:15px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-head{text-align:center;font-size:11px;color:#ccc;padding:4px 0;font-weight:500}
.cal-day{min-height:54px;padding:5px 4px;border-radius:6px;cursor:pointer;transition:background .1s}
.cal-day:hover{background:#f7f7f5}
.cal-day.selected{background:#f1f1ef}
.day-num{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:#9b9b9b;border-radius:50%}
.cal-day.today .day-num{background:#1a1a1a;color:#fff}
.booked-slot{font-size:10px;color:#9b9b9b;background:#f0f0f0;border-radius:3px;padding:1px 4px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.day-detail{background:#f7f7f5;border-radius:10px;padding:1rem;margin-top:1rem}
.detail-head{font-size:12px;color:#ccc;margin-bottom:.7rem}
.b-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #ececec;align-items:center}
.b-item:last-child{border-bottom:none}
.b-bar{width:3px;height:36px;background:#1a1a1a;border-radius:2px;flex-shrink:0}
.b-time{font-size:14px;color:#1a1a1a}
.b-status{font-size:12px;color:#9b9b9b;margin-top:2px}
.empty{font-size:13px;color:#ccc;text-align:center;padding:1.2rem 0}
.success{text-align:center;padding:3rem 0}
.success-check{font-size:40px;margin-bottom:1rem}
.success-title{font-size:22px;font-weight:600;margin-bottom:.25rem}
.success-sub{font-size:14px;color:#9b9b9b;margin-bottom:2rem}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.detail-key{color:#9b9b9b}
.ext-link{color:#0060c0;font-size:13px;text-decoration:none}
.ext-link:hover{text-decoration:underline}
.required-mark{color:#e05c5c;margin-left:2px;font-size:12px}
/* 使用須知 */
.notice-box{background:#f7f7f5;border-radius:8px;padding:1rem 1.25rem;margin-bottom:1.5rem;border-left:3px solid #1a1a1a}
.notice-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:.6rem}
.notice-list{list-style:none;padding:0;margin:0}
.notice-list li{font-size:13px;color:#555;padding:3px 0 3px 1rem;position:relative;line-height:1.6}
.notice-list li::before{content:'·';position:absolute;left:0;color:#9b9b9b}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:#fff;border-radius:12px;padding:2rem 2rem 1.5rem;max-width:320px;width:90%;text-align:center;transform:scale(.95);transition:transform .2s}
.modal-overlay.show .modal-box{transform:scale(1)}
.modal-icon{font-size:32px;margin-bottom:.75rem}
.modal-title{font-size:17px;font-weight:600;margin-bottom:.4rem}
.modal-msg{font-size:14px;color:#9b9b9b;line-height:1.6;margin-bottom:1.5rem}
.modal-btn{padding:9px 28px;background:#1a1a1a;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer}
.modal-btn:hover{opacity:.8}
</style>
</head>
<body>
<div class="page">
  <div class="page-title">彩排室預訂</div>
  <div class="page-sub">jeeplee 彩排室 · NT$180 / hr</div>

  <div class="tab-row">
    <button class="tab active" onclick="switchTab('cal')">日曆</button>
    <button class="tab" onclick="switchTab('book')">新增預訂</button>
  </div>

  <!-- 日曆 -->
  <div id="view-cal">
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">←</button>
      <span class="month-label" id="month-label"></span>
      <button class="month-btn" onclick="changeMonth(1)">→</button>
    </div>
    <div class="cal-grid">
      <div class="cal-head">日</div><div class="cal-head">一</div><div class="cal-head">二</div>
      <div class="cal-head">三</div><div class="cal-head">四</div><div class="cal-head">五</div><div class="cal-head">六</div>
    </div>
    <div class="cal-grid" id="cal-body" style="margin-top:2px"></div>
    <div class="day-detail">
      <div class="detail-head" id="detail-date"></div>
      <div id="detail-list"></div>
    </div>
  </div>

  <!-- 新增預訂 -->
  <div id="view-book" style="display:none">

    <!-- ============================================================
         使用須知區塊 ── 你可以在這裡隨時修改文字內容
         每一條用 <li>...</li> 包起來
         標題在 <div class="notice-title"> 裡改
         ============================================================ -->
    <div class="notice-box">
      <div class="notice-title">使用須知</div>
      <ul class="notice-list">
        <li>預約時間最少 2 小時</li>
        <li>取消或改期請於 48 小時前告知，否則收取全額費用</li>
        <li>付款方式：現金或轉帳，進場前完成付款</li>
        <li>請愛護設備，損壞需照價賠償</li>
        <li>禁止攜帶外食及飲料入內（水除外）</li>
        <li>如有問題請聯繫：jeeplee.official@gmail.com</li>
      </ul>
    </div>
    <!-- ============================================================
         使用須知區塊結束
         ============================================================ -->

    <div id="err-area"></div>
    <div class="prop-row">
      <span class="prop-label">樂團 / 藝人</span>
      <input class="n-input prop-value" id="f-band" placeholder="輸入名稱…" />
    </div>
    <div class="prop-row">
      <span class="prop-label">聯絡人</span>
      <input class="n-input prop-value" id="f-contact" placeholder="姓名、電話或 Line…" />
    </div>
    <div class="prop-row">
      <span class="prop-label">日期</span>
      <input class="n-input prop-value" id="f-date" type="date" />
    </div>
    <div class="prop-row">
      <span class="prop-label">開始時間</span>
      <select class="n-select prop-value" id="f-start"></select>
    </div>
    <div class="prop-row">
      <span class="prop-label">結束時間</span>
      <select class="n-select prop-value" id="f-end"></select>
    </div>
    <div id="midnight-note" style="font-size:12px;color:#9b9b9b;padding:2px 0 4px 130px;display:none">結束時間為隔天</div>
    <div class="prop-row" style="align-items:flex-start">
      <span class="prop-label" style="padding-top:6px">Rider<span class="required-mark">*</span></span>
      <textarea class="n-input prop-value" id="f-notes" rows="4" placeholder="請輸入 Rider 需求（樂器、設備、人數等）…" style="resize:vertical;line-height:1.55"></textarea>
    </div>

    <div class="divider"></div>
    <div id="conflict-area"></div>
    <div style="display:flex;gap:10px;align-items:center;margin-top:.6rem">
      <button class="btn-dark" id="submit-btn" onclick="handleSubmit()">建立預訂</button>
    </div>
    <div id="sync-area" style="margin-top:.6rem"></div>
  </div>

  <!-- 成功 -->
  <div id="view-confirm" style="display:none">
    <div class="success">
      <div class="success-check">✓</div>
      <div class="success-title">預訂已建立</div>
      <div class="success-sub" id="confirm-sub"></div>
      <div id="confirm-detail" style="text-align:left;margin-bottom:1.75rem"></div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn-outline" onclick="switchTab('cal')">查看日曆</button>
        <button class="btn-dark" onclick="resetForm()">再新增一筆</button>
      </div>
    </div>
  </div>
</div>

<!-- 衝突 Modal -->
<div class="modal-overlay" id="conflict-modal">
  <div class="modal-box">
    <div class="modal-icon">⛔</div>
    <div class="modal-title">此時段已有人預定</div>
    <div class="modal-msg">您選擇的時段已被預定，<br>請重新選擇其他可用時段。</div>
    <button class="modal-btn" onclick="closeModal()">重新選擇</button>
  </div>
</div>

<script>
var bookings = [];
var selDate = new Date().toISOString().slice(0,10);
var cy = new Date().getFullYear();
var cm = new Date().getMonth();
var today = new Date().toISOString().slice(0,10);

// ── Modal ─────────────────────────────────────
function showModal() {
  document.getElementById('conflict-modal').classList.add('show');
}
function closeModal() {
  document.getElementById('conflict-modal').classList.remove('show');
}
document.getElementById('conflict-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Tab ───────────────────────────────────────
function switchTab(tab) {
  var tabs = document.querySelectorAll('.tab');
  var names = ['cal','book'];
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', names[i] === tab);
  }
  ['cal','book','confirm'].forEach(function(v) {
    document.getElementById('view-'+v).style.display = v === tab ? '' : 'none';
  });
  if (tab === 'cal') renderCal();
}

// ── 月曆 ──────────────────────────────────────
function changeMonth(d) {
  var dt = new Date(cy, cm + d);
  cy = dt.getFullYear();
  cm = dt.getMonth();
  renderCal();
}

function renderCal() {
  document.getElementById('month-label').textContent = cy + ' 年 ' + (cm+1) + ' 月';
  var first = new Date(cy, cm, 1).getDay();
  var days  = new Date(cy, cm+1, 0).getDate();
  var body  = document.getElementById('cal-body');
  body.innerHTML = '';
  for (var i = 0; i < first; i++) body.appendChild(document.createElement('div'));
  for (var d = 1; d <= days; d++) {
    var ds = cy + '-' + String(cm+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var bks = bookings.filter(function(b){ return b.date === ds; });
    var el = document.createElement('div');
    el.className = 'cal-day' + (ds===today?' today':'') + (ds===selDate?' selected':'');
    var slots = bks.slice(0,2).map(function(b){ return '<div class="booked-slot">'+b.startTime+'–'+b.endTime+' 已預定</div>'; }).join('');
    var more  = bks.length > 2 ? '<div class="booked-slot">+' + (bks.length-2) + ' 筆</div>' : '';
    el.innerHTML = '<div class="day-num">' + d + '</div>' + slots + more;
    (function(ds){ el.onclick = function(){ selDate=ds; renderCal(); renderDetail(); }; })(ds);
    body.appendChild(el);
  }
  renderDetail();
}

function renderDetail() {
  document.getElementById('detail-date').textContent = selDate;
  var bks = bookings.filter(function(b){ return b.date === selDate; });
  var list = document.getElementById('detail-list');
  if (!bks.length) { list.innerHTML = '<div class="empty">此日尚無預訂</div>'; return; }
  list.innerHTML = bks.map(function(b) {
    var sm = t2m(b.startTime), em = t2m(b.endTime);
    var hrs = ((em > sm ? em - sm : em + 1440 - sm) / 60).toFixed(1);
    return '<div class="b-item"><div class="b-bar"></div><div><div class="b-time">'+b.startTime+' – '+b.endTime+'</div><div class="b-status">已預定 · '+hrs+'hr</div></div></div>';
  }).join('');
}

// ── 時間工具 ──────────────────────────────────
function t2m(t) {
  var parts = t.split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1]);
}

function minsToTime(mins) {
  var h = Math.floor(mins / 60) % 24;
  var m = mins % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

function getEndDate(baseDate, endMins) {
  if (endMins >= 1440) {
    var d = new Date(baseDate);
    d.setDate(d.getDate() + 1);
    return d.toISOString().slice(0,10);
  }
  return baseDate;
}

function overlapCheck(b, startMins, endMins, date) {
  var aStart = t2m(b.startTime);
  var aEnd   = t2m(b.endTime);
  if (aEnd <= aStart) aEnd += 1440;
  if (b.date === date) {
    return startMins < aEnd && aStart < endMins;
  }
  var prev = new Date(date);
  prev.setDate(prev.getDate() - 1);
  var prevStr = prev.toISOString().slice(0,10);
  if (b.date === prevStr && endMins >= 1440) {
    return (startMins + 1440) < aEnd && aStart < endMins;
  }
  return false;
}

// ── 建立時間下拉選單 ──────────────────────────
function buildTimeOptions() {
  var opts = [];
  for (var h = 0; h < 24; h++) {
    for (var m = 0; m < 60; m += 30) {
      opts.push({ value: h*60+m, label: String(h).padStart(2,'0')+':'+String(m).padStart(2,'0') });
    }
  }
  for (var h = 0; h < 6; h++) {
    for (var m = 0; m < 60; m += 30) {
      opts.push({ value: (h+24)*60+m, label: String(h+24).padStart(2,'0')+':'+String(m).padStart(2,'0') });
    }
  }
  return opts;
}
var TIME_OPTS = buildTimeOptions();

function populateTimeSelects() {
  ['f-start','f-end'].forEach(function(id) {
    var sel = document.getElementById(id);
    sel.innerHTML = TIME_OPTS.map(function(o) {
      return '<option value="'+o.value+'">'+o.label+'</option>';
    }).join('');
  });
  document.getElementById('f-start').value = 600;
  document.getElementById('f-end').value   = 720;
}

// ── 費用計算 ──────────────────────────────────
function updateCost() {
  var startMins = parseInt(document.getElementById('f-start').value);
  var endMins   = parseInt(document.getElementById('f-end').value);
  var d = document.getElementById('f-date').value;
  var hrs = endMins > startMins ? (endMins - startMins) / 60 : 0;

  document.getElementById('midnight-note').style.display = endMins >= 1440 ? '' : 'none';

  var conflicts = d && hrs > 0 ? bookings.filter(function(b){ return overlapCheck(b, startMins, endMins, d); }) : [];
  document.getElementById('conflict-area').innerHTML = conflicts.length
    ? '<div class="alert alert-warn">該時段已滿額，請選擇其他時間</div>' : '';
  document.getElementById('submit-btn').disabled = conflicts.length > 0 || hrs <= 0;
}

// ── 重設表單 ──────────────────────────────────
function resetForm() {
  document.getElementById('f-band').value    = '';
  document.getElementById('f-contact').value = '';
  document.getElementById('f-notes').value   = '';
  document.getElementById('f-start').value   = 600;
  document.getElementById('f-end').value     = 720;
  document.getElementById('f-date').value    = today;
  document.getElementById('midnight-note').style.display = 'none';
  document.getElementById('f-notes').classList.remove('required-empty');
  document.getElementById('submit-btn').disabled = false;
  ['err-area','cost-area','conflict-area','sync-area'].forEach(function(id){
    document.getElementById(id).innerHTML = '';
  });
  switchTab('book');
}

// ── 同步狀態 ──────────────────────────────────
function syncHTML(g, n) {
  function dot(s) { return '<span class="dot dot-'+s+'"></span>'; }
  function lbl(s) { return s==='spin'?'同步中…':s==='ok'?'同步成功':'同步失敗'; }
  return '<div class="sync-row">'+dot(g)+' Google 日曆　'+lbl(g)+'</div>'
       + '<div class="sync-row">'+dot(n)+' Notion　'+lbl(n)+'</div>';
}

// ── 送出預訂 ──────────────────────────────────
function handleSubmit() {
  var band    = document.getElementById('f-band').value.trim();
  var contact = document.getElementById('f-contact').value.trim();
  var date    = document.getElementById('f-date').value;
  var startMins = parseInt(document.getElementById('f-start').value);
  var endMins   = parseInt(document.getElementById('f-end').value);
  var notes   = document.getElementById('f-notes').value.trim();
  var ea      = document.getElementById('err-area');
  var riderEl = document.getElementById('f-notes');

  if (!notes) {
    riderEl.classList.add('required-empty');
    riderEl.focus();
    ea.innerHTML = '<div class="alert alert-err">請填寫 Rider 需求</div>';
    return;
  }
  riderEl.classList.remove('required-empty');

  if (!band || !date) {
    ea.innerHTML = '<div class="alert alert-err">請填寫所有必填欄位（樂團、日期）</div>';
    return;
  }
  var hrs = (endMins - startMins) / 60;
  if (hrs <= 0) {
    ea.innerHTML = '<div class="alert alert-err">結束時間必須晚於開始時間</div>';
    return;
  }

  var conflicts = date && hrs > 0 ? bookings.filter(function(b){ return overlapCheck(b, startMins, endMins, date); }) : [];
  if (conflicts.length > 0) { showModal(); return; }

  ea.innerHTML = '';
  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '建立中…';

  var startStr   = minsToTime(startMins);
  var endStr     = minsToTime(endMins);
  var endDate    = getEndDate(date, endMins);
  var startLabel = TIME_OPTS.find(function(o){ return o.value===startMins; }).label;
  var endLabel   = TIME_OPTS.find(function(o){ return o.value===endMins; }).label;

  var payload = {
    bandName: band, contact: contact, date: date,
    startTime: startStr, endTime: endStr, endDate: endDate,
    clientType: '新客', bandType: '樂團', bookingStatus: '已確認', payStatus: '未付款',
    notes: notes
  };

  document.getElementById('sync-area').innerHTML = syncHTML('spin','spin');

  Promise.allSettled([
    fetch('/api/google-calendar', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }).then(function(r){ return r.json(); }),
    fetch('/api/notion',          { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }).then(function(r){ return r.json(); })
  ]).then(function(results) {
    var gcal   = results[0].status==='fulfilled' ? results[0].value : {ok:false};
    var notion = results[1].status==='fulfilled' ? results[1].value : {ok:false};

    document.getElementById('sync-area').innerHTML = syncHTML(gcal.ok?'ok':'err', notion.ok?'ok':'err');

    if (gcal.ok || notion.ok) {
      bookings.push({ id: Date.now()+'', bandName: band, date: date, startTime: startStr, endTime: endStr });
      var timeRange = endMins >= 1440
        ? startLabel + ' – ' + endLabel + '（隔天）（' + hrs + 'hr）'
        : startLabel + ' – ' + endLabel + '（' + hrs + 'hr）';
      var cd = document.getElementById('confirm-detail');
      var rows = [['樂團',band],['日期',date],['時段',timeRange],['Rider',notes]];
      cd.innerHTML = rows.map(function(r){
        return '<div class="detail-row"><span class="detail-key">'+r[0]+'</span><span style="max-width:60%;text-align:right">'+r[1]+'</span></div>';
      }).join('');
      var links = [];
      if (gcal.link)  links.push('<a class="ext-link" href="'+gcal.link+'" target="_blank">Google 日曆 →</a>');
      if (notion.url) links.push('<a class="ext-link" href="'+notion.url+'" target="_blank">Notion →</a>');
      if (links.length) cd.innerHTML += '<div style="margin-top:.8rem;display:flex;gap:1.2rem">'+links.join('')+'</div>';
      var synced = [gcal.ok&&'Google 日曆', notion.ok&&'Notion'].filter(Boolean).join(' 與 ');
      document.getElementById('confirm-sub').textContent = '已同步至 ' + synced;
      ['cal','book','confirm'].forEach(function(v){
        document.getElementById('view-'+v).style.display = v==='confirm' ? '' : 'none';
      });
      document.querySelectorAll('.tab').forEach(function(el){ el.classList.remove('active'); });
    } else {
      ea.innerHTML = '<div class="alert alert-err">同步失敗，請稍後再試</div>';
      btn.disabled = false;
      btn.textContent = '建立預訂';
    }
  });
}

// ── 載入預訂 ──────────────────────────────────
function fetchBookings() {
  fetch('/api/google-calendar').then(function(r){ return r.json(); }).then(function(d){
    if (d.ok && Array.isArray(d.bookings)) bookings = d.bookings;
    renderCal();
  }).catch(function(){ renderCal(); });
}

// ── 事件監聽 ──────────────────────────────────
document.getElementById('f-start').addEventListener('change', updateCost);
document.getElementById('f-end').addEventListener('change', updateCost);
document.getElementById('f-date').addEventListener('change', updateCost);
document.getElementById('f-notes').addEventListener('input', function(){
  if (this.value.trim()) this.classList.remove('required-empty');
});

// ── 初始化 ────────────────────────────────────
document.getElementById('f-date').min   = today;
document.getElementById('f-date').value = today;
populateTimeSelects();
renderCal();
fetchBookings();
</script>
